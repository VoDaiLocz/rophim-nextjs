services:
  - type: web
    name: rophim-server
    runtime: node
    plan: free
    region: singapore
    branch: main
    autoDeployTrigger: off
    healthCheckPath: /health
    buildCommand: corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm install --frozen-lockfile --prod=false && pnpm --filter @rophim/database migrate:deploy && pnpm --filter @rophim/database build && pnpm --filter @rophim/server build
    startCommand: pnpm --filter @rophim/server start:prod
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rophim-postgres
          property: connectionString

databases:
  - name: rophim-postgres
    plan: free
    databaseName: rophim
    user: rophim
