name: Setup Node.js and pnpm
description: Install the pinned Node.js and pnpm toolchain with dependency and Turbo caches.

inputs:
  node-version:
    description: Node.js version used by CI.
    required: false
    default: 22.x
  pnpm-version:
    description: pnpm version used by CI.
    required: false
    default: 9.0.0

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Restore Turbo cache
      uses: actions/cache@v4
      with:
        path: .turbo
        key: turbo-${{ runner.os }}-${{ github.job }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ runner.os }}-${{ github.job }}-
          turbo-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
