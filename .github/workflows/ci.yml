name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: "1"
  TURBO_TELEMETRY_DISABLED: "1"
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rophim_ci

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft != true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Check formatting
        run: pnpm format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: github.event.pull_request.draft != true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Run lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft != true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Run typecheck
        run: pnpm check-types

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft != true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Run tests
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.pull_request.draft != true
    needs:
      - format
      - lint
      - typecheck
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Build applications
        run: pnpm build
